name: Weekly Task Reminder

on:
  schedule:
    # 每天早上 8:30 CST（北京时间）= UTC 00:30
    - cron: "30 0 * * *"
  workflow_dispatch: # 允许手动触发，方便测试

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send reminder email
        env:
          REMINDER_SENDER:   ${{ secrets.REMINDER_SENDER }}
          REMINDER_PASSWORD: ${{ secrets.REMINDER_PASSWORD }}
          REMINDER_RECEIVER: ${{ secrets.REMINDER_RECEIVER }}
        run: python 工具脚本/weekly_reminder/send_reminder.py
